<a class="kofi-cta" [href]="href" target="_blank" rel="noopener noreferrer">
  <div class="kofi-cta-text">
    <span class="kofi-cta-title">{{ title }}</span>
    <span class="kofi-cta-link">
      <img [src]="kofiIconSrc" alt="Ko-fi logo" class="kofi-icon" />
      {{ displayUrl }}
    </span>
  </div>
</a>
