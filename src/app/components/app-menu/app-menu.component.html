<ion-menu side="start" menuId="main-menu" contentId="main-content" [swipeGesture]="false">
  <ion-header>
    <ion-toolbar color="primary">
      <ion-title class="menu-header">
        <h1 class="main-title">{{ appName }}</h1>
      </ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content>

    <ion-list lines="none">

      @if (users$ | async; as users) {
        @if (users.length > 0) {
          @if (activeUid$ | async; as activeUid) {
            <div class="menu-block" role="list" aria-label="Usuarios">
              @for (user of users; track user.uid) {
                <button
                  type="button"
                  role="listitem"
                  class="menu-badge"
                  [class.menu-badge-active]="user.uid === activeUid"
                  [attr.aria-pressed]="user.uid === activeUid"
                  (click)="setActiveUser(user.uid)"
                >
                  <span class="menu-badge-main">
                    @if (user.avatar) {
                      <img class="menu-badge-avatar" [src]="user.avatar" [alt]="'Avatar de ' + user.name" />
                    } @else {
                      <span class="menu-badge-avatar menu-badge-avatar-fallback" aria-hidden="true">
                        {{ user.name.charAt(0).toUpperCase() }}
                      </span>
                    }
                    <span class="menu-badge-name">{{ user.name }}</span>
                    <span class="menu-badge-roles">
                      @if (user.master || user.admin) {
                        <ion-icon
                          class="user-role-icon user-role-icon-master"
                          name="compass"
                          title="Master"
                          aria-label="Master"
                        ></ion-icon>
                      }
                      @if (user.admin) {
                        <ion-icon
                          class="user-role-icon user-role-icon-admin"
                          name="shield-checkmark"
                          title="Admin"
                          aria-label="Admin"
                        ></ion-icon>
                      }
                    </span>
                  </span>
                  <button
                    type="button"
                    class="menu-badge-logout"
                    [attr.aria-label]="'Cerrar sesión de ' + user.name"
                    title="Cerrar sesión"
                    (click)="$event.stopPropagation(); logout(user.uid)"
                  >
                    <ion-icon name="close-circle" aria-hidden="true"></ion-icon>
                  </button>
                </button>
              }
              <button
                type="button"
                role="listitem"
                class="menu-badge menu-badge-add"
                (click)="openLoginModal()"
              >
                <span class="menu-badge-main">
                  <span class="menu-badge-avatar menu-badge-avatar-action" aria-hidden="true">+</span>
                  <span class="menu-badge-name">Añadir usuario</span>
                </span>
              </button>
            </div>
          }
        } @else {
          <div class="menu-block">
            <button
              type="button"
              class="menu-badge menu-badge-add"
              (click)="openLoginModal()"
            >
              <span class="menu-badge-main">
                <span class="menu-badge-avatar menu-badge-avatar-action" aria-hidden="true">+</span>
                <span class="menu-badge-name">Iniciar sesión</span>
              </span>
            </button>
          </div>
        }
      }

      <div class="menu-block" role="list" aria-label="Navegacion">
        <ion-menu-toggle auto-hide="true">
          <button
            type="button"
            role="listitem"
            class="menu-badge"
            routerLink="/all-characters"
            routerDirection="forward"
          >
            <span class="menu-badge-main">
              <span class="menu-badge-name">Todos los personajes</span>
            </span>
          </button>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="true">
          <button
            type="button"
            role="listitem"
            class="menu-badge"
            routerLink="/resources"
            routerDirection="forward"
          >
            <span class="menu-badge-main">
              <span class="menu-badge-name">Recursos</span>
            </span>
          </button>
        </ion-menu-toggle>
      </div>

      <div class="menu-block" role="list" aria-label="Configuración">
        @if (isLoggedIn()) {
          <ion-menu-toggle auto-hide="true">
            <button
              type="button"
              role="listitem"
              class="menu-badge"
              routerLink="/settings"
              routerDirection="forward"
            >
              <span class="menu-badge-main">
                <span class="menu-badge-avatar menu-badge-avatar-action" aria-hidden="true">
                  <ion-icon name="settings-outline"></ion-icon>
                </span>
                <span class="menu-badge-name">Configuración</span>
              </span>
            </button>
          </ion-menu-toggle>
        }

        <button
          type="button"
          role="listitem"
          class="menu-badge"
          (click)="openThemeSelector()"
        >
          <span class="menu-badge-main">
            <span class="menu-badge-avatar menu-badge-avatar-action" aria-hidden="true">
              <ion-icon name="color-palette-outline"></ion-icon>
            </span>
            <span class="menu-badge-name">Apariencia</span>
          </span>
        </button>
      </div>

    </ion-list>
  </ion-content>

  <ion-footer class="menu-kofi-footer">
    <app-kofi-support-card></app-kofi-support-card>
  </ion-footer>
</ion-menu>
