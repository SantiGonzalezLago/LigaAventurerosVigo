<ion-modal class="login-modal" [isOpen]="isOpen" (didPresent)="onDidPresent()" (didDismiss)="onDidDismiss()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Iniciar sesion</ion-title>
        <ion-buttons slot="end">
          <ion-button class="round-button" fill="clear" aria-label="Cerrar" (click)="closeModal()">
            <ion-icon name="close-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <div class="modal-body ion-padding">
      <ion-item>
        <ion-input
          [(ngModel)]="user"
          [disabled]="isSubmitting"
          (ngModelChange)="clearErrorMessage()"
          (keyup.enter)="login()"
          autocomplete="username"
          placeholder="Email"
        ></ion-input>
      </ion-item>
      <ion-item>
        <ion-input
          [(ngModel)]="password"
          [disabled]="isSubmitting"
          (ngModelChange)="clearErrorMessage()"
          (keyup.enter)="login()"
          autocomplete="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Contraseña"
        ></ion-input>
        <ion-button
          slot="end"
          fill="clear"
          [disabled]="isSubmitting"
          [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          (click)="togglePasswordVisibility()"
        >
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </ion-button>
      </ion-item>
      @if (errorMessage) {
        <ion-text color="danger" class="login-error">{{ errorMessage }}</ion-text>
      }
      <ion-button expand="block" [disabled]="isSubmitting" (click)="login()">Entrar</ion-button>

      <div class="separator" aria-hidden="true">
        <span>o</span>
      </div>

      <div class="google-login-section">
        @if (isGoogleLoading) {
          <ion-text color="medium" class="google-status">Preparando acceso con Google...</ion-text>
        }

        @if (googleErrorMessage) {
          <ion-text color="danger" class="login-error">{{ googleErrorMessage }}</ion-text>
          <ion-button fill="clear" size="small" [disabled]="isGoogleLoading" (click)="retryGoogleSetup()">
            Reintentar Google
          </ion-button>
        }

        @if (googleButtonReady) {
          <div #googleButtonContainer class="google-button-container"></div>
        }
      </div>
    </div>
  </ng-template>
</ion-modal>
