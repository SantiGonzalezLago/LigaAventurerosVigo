<ion-modal class="login-modal" [isOpen]="isOpen" (didDismiss)="onDidDismiss()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Iniciar sesion</ion-title>
        <ion-buttons slot="end">
          <ion-button class="round-button" fill="clear" aria-label="Cerrar" (click)="closeModal()">
            <ion-icon name="close-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <div class="modal-body ion-padding">
      <ion-item>
        <ion-input
          [(ngModel)]="user"
          [disabled]="isSubmitting"
          (ngModelChange)="clearErrorMessage()"
          (keyup.enter)="login()"
          autocomplete="username"
          placeholder="Email"
        ></ion-input>
      </ion-item>
      <ion-item>
        <ion-input
          [(ngModel)]="password"
          [disabled]="isSubmitting"
          (ngModelChange)="clearErrorMessage()"
          (keyup.enter)="login()"
          autocomplete="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Contraseña"
        ></ion-input>
        <ion-button
          slot="end"
          fill="clear"
          [disabled]="isSubmitting"
          [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          (click)="togglePasswordVisibility()"
        >
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </ion-button>
      </ion-item>
      @if (errorMessage) {
        <ion-text color="danger" class="login-error">{{ errorMessage }}</ion-text>
      }
      <ion-button expand="block" [disabled]="isSubmitting" (click)="login()">Entrar</ion-button>

      <div class="separator" aria-hidden="true">
        <span>o</span>
      </div>

      <ion-button class="google-login-button" expand="block" fill="outline" aria-label="Continuar con Google">
        <span>Continuar con</span>
        <img class="google-logo" src="assets/images/google.svg" alt="Google" />
      </ion-button>
    </div>
  </ng-template>
</ion-modal>
