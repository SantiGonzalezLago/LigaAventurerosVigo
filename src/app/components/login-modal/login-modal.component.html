<ion-modal class="login-modal" [isOpen]="isOpen" (didDismiss)="onDidDismiss()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Iniciar sesion</ion-title>
      </ion-toolbar>
    </ion-header>

    <div class="modal-body ion-padding">
      <ion-item>
        <ion-input placeholder="Usuario"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input type="password" placeholder="Contraseña"></ion-input>
      </ion-item>
      <ion-button expand="block">Entrar</ion-button>

      <div class="separator" aria-hidden="true">
        <span>o</span>
      </div>

      <ion-button expand="block" fill="outline">Continuar con Google</ion-button>
    </div>
  </ng-template>
</ion-modal>
